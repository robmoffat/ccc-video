<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>10. Two: Use The Ecosystem</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card slide-layout slide-layout--center slide-layout--step-reveal bg-black">
      <p class="slide-step-label">2</p>
      <p class="slide-title">Use The Ecosystem</p>
      <audio class="step-reveal__audio" src="8.mp3" preload="auto"></audio>
    </article>
  </div>
  <script src="../scripts/presentation.js"></script>
  <script>
    (function () {
      var slide = document.querySelector('.slide-layout--step-reveal');
      if (!slide) return;

      var audio = slide.querySelector('.step-reveal__audio');

      function play() {
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }
      Presentation.register({ play: play, audio: audio });
    })();
  </script>
</body>
</html>
