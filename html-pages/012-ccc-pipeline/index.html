<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>7. Pipeline</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card pipeline pipeline--animated bg-black">
      <div class="pipeline__node pipeline__node--main">
        <p class="pipeline__node-title">CCC</p>
        <p class="pipeline__node-sub">Capabilities • Threats • Controls • Assessment Requirements</p>
      </div>
      <div class="pipeline__node">
        <p class="pipeline__node-title" style="font-size: 1.5rem;">Machine Readable Definitions</p>
      </div>
      <div class="pipeline__fork">
        <div class="pipeline__branch">
          <div class="pipeline__node">
            <p class="pipeline__node-title" style="font-size: 1.25rem;">Policy as Code</p>
            <p class="pipeline__node-sub">Azure Policy</p>
          </div>
        </div>
        <div class="pipeline__branch">
          <div class="pipeline__node">
            <p class="pipeline__node-title" style="font-size: 1.25rem;">Infrastructure as Code</p>
            <p class="pipeline__node-sub">Terraform</p>
          </div>
        </div>
        <div class="pipeline__branch">
          <div class="pipeline__node">
            <p class="pipeline__node-title" style="font-size: 1.25rem;">Validation Tools</p>
            <p class="pipeline__node-sub">CSPM</p>
          </div>
        </div>
      </div>
      <audio class="pipeline__audio" src="5.mp3" preload="auto"></audio>
    </article>
  </div>
  <script>
    (function () {
      var slide = document.querySelector('.pipeline--animated');
      if (!slide) return;

      var audio = slide.querySelector('.pipeline__audio');

      function play() {
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }

      if (new URLSearchParams(window.location.search).has('autoplay')) {
        play();
      }

      window.addEventListener('click', play);
      window.addEventListener('keydown', function (event) {
        if (event.repeat) return;
        play();
      });
    })();
  </script>
</body>
</html>
