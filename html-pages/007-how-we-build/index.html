  <script src="../scripts/presentation.js"></script>
  <script>
    (function () {
      var slide = document.querySelector('.three-sections--animated');
      if (!slide) return;

      var audio = slide.querySelector('.build-audio');
      var chips = Array.prototype.slice.call(slide.querySelectorAll('.arch-logo-chip'));

      function parseSeconds(value) {
        return parseFloat(value) * 1000;
      }

      function getBuildTiming() {
        var styles = getComputedStyle(slide);
        return {
          labelPhase: parseSeconds(styles.getPropertyValue('--build-label-phase').trim() || '4s'),
          iconStart: parseSeconds(styles.getPropertyValue('--build-icon-phase-start').trim() || '4s'),
          iconPhase: parseSeconds(styles.getPropertyValue('--build-icon-phase').trim() || '4s')
        };
      }

      function shuffle(items) {
        var shuffled = items.slice();

        for (var i = shuffled.length - 1; i > 0; i -= 1) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = shuffled[i];
          shuffled[i] = shuffled[j];
          shuffled[j] = temp;
        }

        return shuffled;
      }

      function resetChips() {
        chips.forEach(function (chip) {
          chip.classList.remove('is-revealed');
          chip.style.animationDelay = '';
        });
      }

      function play() {
        var timing = getBuildTiming();
        var orderedChips = shuffle(chips);
        var iconStep = timing.iconPhase / orderedChips.length;

        resetChips();
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        orderedChips.forEach(function (chip, index) {
          chip.classList.add('is-revealed');
          chip.style.animationDelay = (timing.iconStart + index * iconStep) + 'ms';
        });

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }
      Presentation.register({ play: play, audio: audio });
    })();
  </script>
