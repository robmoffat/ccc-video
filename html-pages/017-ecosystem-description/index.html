<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>11. Ecosystem Description</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card slide-layout slide-layout--center ecosystem-grid--animated bg-black">
      <div class="ecosystem-grid">
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/prowler.png" alt="Prowler">
          </div>
          <span class="ecosystem-logo__label">Prowler</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/my-additions/privateer.png" alt="Privateer">
          </div>
          <span class="ecosystem-logo__label">Privateer</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/my-additions/azure.png" alt="Azure Policy">
          </div>
          <span class="ecosystem-logo__label">Azure Policy</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/my-additions/avm.svg" alt="Azure Verified Modules">
          </div>
          <span class="ecosystem-logo__label">Azure Verified Modules</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/my-additions/aws2.png" alt="AWS Lightning Lane">
          </div>
          <span class="ecosystem-logo__label">AWS Lightning Lane</span>
        </div>
        <div class="ecosystem-logo"> 
          <div class="ecosystem-logo__mark">
            <img src="assets/my-additions/gemara.svg" alt="Gemara">
          </div>
          <span class="ecosystem-logo__label">Gemara</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/my-additions/grc.png" alt="GRC.Store">
          </div>
          <span class="ecosystem-logo__label">GRC.Store</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/github-releases.svg" alt="GitHub Releases">
          </div>
          <span class="ecosystem-logo__label">GitHub Releases</span>
        </div>
        <div class="ecosystem-logo">
          <div class="ecosystem-logo__mark">
            <img src="assets/calm.png" alt="CALM">
          </div>
          <span class="ecosystem-logo__label">CALM</span>
        </div>
      </div>
      <p class="slide-url" style="font-size: 2.5rem; margin-top: 1.5rem;">ccc.finos.org/ecosystem</p>
      <audio class="ecosystem-grid__audio" src="8.2.mp3" preload="auto"></audio>
    </article>
  </div>
  <script>
    (function () {
      var slide = document.querySelector('.ecosystem-grid--animated');
      if (!slide) return;

      var audio = slide.querySelector('.ecosystem-grid__audio');
      var logos = Array.prototype.slice.call(slide.querySelectorAll('.ecosystem-logo'));

      function parseSeconds(value) {
        return parseFloat(value) * 1000;
      }

      function getEcosystemTiming() {
        var styles = getComputedStyle(slide);
        return {
          iconStart: parseSeconds(styles.getPropertyValue('--ecosystem-icon-phase-start').trim() || '0s'),
          iconPhase: parseSeconds(styles.getPropertyValue('--ecosystem-icon-phase').trim() || '8s')
        };
      }

      function shuffle(items) {
        var shuffled = items.slice();

        for (var i = shuffled.length - 1; i > 0; i -= 1) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = shuffled[i];
          shuffled[i] = shuffled[j];
          shuffled[j] = temp;
        }

        return shuffled;
      }

      function resetLogos() {
        logos.forEach(function (logo) {
          logo.classList.remove('is-revealed');
          logo.style.animationDelay = '';
        });
      }

      function play() {
        var timing = getEcosystemTiming();
        var orderedLogos = shuffle(logos);
        var iconStep = timing.iconPhase / orderedLogos.length;

        resetLogos();
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        orderedLogos.forEach(function (logo, index) {
          logo.classList.add('is-revealed');
          logo.style.animationDelay = (timing.iconStart + index * iconStep) + 'ms';
        });

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }

      if (new URLSearchParams(window.location.search).has('autoplay')) {
        play();
      }

      window.addEventListener('click', play);
      window.addEventListener('keydown', function (event) {
        if (event.repeat) return;
        play();
      });
    })();
  </script>
</body>
</html>
