<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>15. Definitions Breakdown</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card slide-layout slide-layout--definitions-breakdown bg-black">
      <div class="pipeline__types definitions-breakdown__types">
        <div class="pipeline__type">
          <img class="pipeline__type-icon" src="../011-ccc-architecture/assets/types/capability.svg" alt="">
          <span class="pipeline__type-label">Capabilities</span>
        </div>
        <div class="pipeline__type">
          <img class="pipeline__type-icon" src="../011-ccc-architecture/assets/types/threat.svg" alt="">
          <span class="pipeline__type-label">Threats</span>
        </div>
        <div class="pipeline__type">
          <img class="pipeline__type-icon" src="../011-ccc-architecture/assets/types/control.svg" alt="">
          <span class="pipeline__type-label">Controls</span>
        </div>
        <div class="pipeline__type">
          <img class="pipeline__type-icon" src="../011-ccc-architecture/assets/types/assessment-requirement.svg" alt="">
          <span class="pipeline__type-label">Assessment Requirements</span>
        </div>
      </div>
      <div class="definitions-breakdown__video-wrap">
        <video
          class="definitions-breakdown__video"
          src="CCC-Use-The-Definitions.mp4"
          muted
          playsinline
          preload="auto"
        ></video>
      </div>
      <p class="slide-url definitions-breakdown__url">ccc.finos.org/catalogs</p>
      <audio class="definitions-breakdown__audio" src="7.2.mp3" preload="auto"></audio>
    </article>
  </div>
  <script src="../scripts/presentation.js"></script>
  <script>
    (function () {
      var slide = document.querySelector('.slide-layout--definitions-breakdown');
      if (!slide) return;

      var video = slide.querySelector('.definitions-breakdown__video');
      var audio = slide.querySelector('.definitions-breakdown__audio');

      function play() {
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        if (video) {
          video.pause();
          video.currentTime = 0;
          video.play();
        }

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }
      Presentation.register({ play: play, audio: audio });
    })();
  </script>
</body>
</html>
