<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>5. AI</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card slide-layout slide-layout--center slide-layout--ai slide-layout--ai-animated bg-black">
      <header class="slide-ai__header">
        <p class="text-heading text-accent slide-ai__caption">AI being used everywhere</p>
      </header>
      <div class="flow-row">
        <div class="flow-box bg-panel-cyan border-cyan">
          <img class="flow-box__icon" src="assets/prompt.svg" alt="">
          <p class="text-heading text-white">AI Prompt</p>
        </div>
        <span class="flow-arrow text-accent" aria-hidden="true">→</span>
        <div class="flow-box bg-panel-cyan border-cyan">
          <img class="flow-box__icon" src="assets/architecture.svg" alt="">
          <p class="text-heading text-white">Generated Architecture</p>
        </div>
        <span class="flow-arrow text-accent" aria-hidden="true">→</span>
        <div class="flow-box bg-panel-cyan border-cyan">
          <img class="flow-box__icon" src="assets/policy.svg" alt="">
          <p class="text-heading text-white">Generated Policies</p>
        </div>
        <span class="flow-arrow text-accent" aria-hidden="true">→</span>
        <div class="flow-box bg-panel-cyan border-cyan">
          <img class="flow-box__icon" src="assets/infrastructure.svg" alt="">
          <p class="text-heading text-white">Generated Infrastructure</p>
        </div>
      </div>
      <audio class="slide-ai__audio" src="02-ai.mp3" preload="auto"></audio>
    </article>
  </div>
  <script src="../scripts/presentation.js"></script>
  <script>
    (function () {
      var slide = document.querySelector('.slide-layout--ai-animated');
      if (!slide) return;

      var audio = slide.querySelector('.slide-ai__audio');

      function play() {
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }
      Presentation.register({ play: play, audio: audio });
    })();
  </script>
</body>
</html>
