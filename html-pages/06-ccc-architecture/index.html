<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>6. CCC Architecture</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card arch-split bg-black">
      <section class="arch-panel arch-panel--left">
        <p class="text-caption-cyan arch-panel__title">Inputs</p>
        <div class="arch-inputs">
          <div class="arch-input">
            <span class="arch-input__icon">📄</span>
            <span class="arch-input__label">Cloud Docs</span>
          </div>
          <div class="arch-input">
            <span class="arch-input__icon">🛡</span>
            <span class="arch-input__label">Threat Intel</span>
          </div>
          <div class="arch-input">
            <span class="arch-input__icon">⚖</span>
            <span class="arch-input__label">Regulations</span>
          </div>
          <div class="arch-input">
            <span class="arch-input__icon">📋</span>
            <span class="arch-input__label">Frameworks</span>
          </div>
        </div>
      </section>
      <section class="arch-panel arch-panel--right">
        <p class="text-caption-cyan arch-panel__title">Four-Layer Stack</p>
        <div class="layer-stack">
          <div class="layer-stack__item">Assessment Requirements</div>
          <div class="layer-stack__item">Controls</div>
          <div class="layer-stack__item">Threats</div>
          <div class="layer-stack__item">Capabilities</div>
        </div>
      </section>
    </article>
  </div>
</body>
</html>
