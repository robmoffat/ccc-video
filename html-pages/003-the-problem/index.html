  <link rel="stylesheet" href="../styles/slides.css">

<body class="theme-brand">
  <div class="slide">

          <p class="text-heading text-white problem-factor__label">100s of services</p>
          <div class="problem-factor__services-wrap">

            <div class="problem-factor__service-mark">

            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/azure/10023-icon-service-Kubernetes-Services.svg" alt="Kubernetes Services">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/gcp/GKE-512-color.svg" alt="Google Kubernetes Engine">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/aws/Arch_Amazon-ECS-Anywhere_64.svg" alt="Amazon ECS Anywhere">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/azure/10024-icon-service-Mesh-Applications.svg" alt="Mesh Applications">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/gcp/CloudSpanner-512-color.svg" alt="Cloud Spanner">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/azure/10026-icon-service-Disks-Snapshots.svg" alt="Disks and Snapshots">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/gcp/BigQuery-512-color.svg" alt="BigQuery">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/azure/10030-icon-service-Cloud-Services-(Classic).svg" alt="Cloud Services">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/gcp/VertexAI-512-color.svg" alt="Vertex AI">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/aws/Arch_AWS-Fargate_64.png" alt="AWS Fargate">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/aws/Arch_Amazon-Braket_64.png" alt="Amazon Braket">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/aws/Arch_Amazon-Aurora_64.svg" alt="">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/gcp/BigQuery-512-color.svg" alt="">
            </div>
            <div class="problem-factor__service-mark">
              <img src="assets/azure/10023-icon-service-Kubernetes-Services.svg" alt="">

        <span class="problem-factor__operator text-accent" aria-hidden="true">×</span>

          <p class="text-heading text-white problem-factor__label">100s of FSIs</p>
          <div class="problem-factor__firms-wrap">
            <div class="problem-factor__icons problem-factor__icons--firms">
            <div class="problem-factor__firm-mark">

            <div class="problem-factor__firm-mark">

      <div class="problem-bottom">
        <div class="equation">
          <p class="equation__result">Thousands of Security &amp; Compliance Questions</p>
        </div>
      </div>
    </article>
  </div>
  <script>
    (function () {
      var slide = document.querySelector('.slide-layout--problem');
      if (!slide) return;

      function play() {
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');
      }

      if (new URLSearchParams(window.location.search).has('autoplay')) {
        play();
      }

      window.addEventListener('click', play);
      window.addEventListener('keydown', function (event) {
        if (event.repeat) return;
        play();
      });
    })();
  </script>
</body>
</html>
