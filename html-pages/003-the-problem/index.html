  <script>
    (function () {
      var slide = document.querySelector('.slide-layout--problem');
      if (!slide) return;

      var audio = slide.querySelector('.problem__audio');
      var popGroups = [
        { selector: '.problem-factor__csp-mark', step: 0 },
        { selector: '.problem-factor__service-mark', step: 1 },
        { selector: '.problem-factor__firm-mark', step: 2 },
        { selector: '.problem-factor__icons--jurisdictions .icon-chip', step: 3 }
      ];

      function shuffle(items) {
        var shuffled = Array.prototype.slice.call(items);

        for (var i = shuffled.length - 1; i > 0; i -= 1) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = shuffled[i];
          shuffled[i] = shuffled[j];
          shuffled[j] = temp;
        }

        return shuffled;
      }

      function getTiming() {
        var styles = getComputedStyle(slide);
        return {
          revealPause: parseFloat(styles.getPropertyValue('--problem-reveal-pause').trim() || '2') * 1000,
          popPhase: parseFloat(styles.getPropertyValue('--problem-csp-pop-phase').trim() || '2') * 1000
        };
      }

      function resetPopIcons() {
        popGroups.forEach(function (group) {
          slide.querySelectorAll(group.selector).forEach(function (mark) {
            mark.classList.remove('is-revealed');
            mark.style.animationDelay = '';
          });
        });
      }

      function popIcons() {
        var timing = getTiming();

        popGroups.forEach(function (group) {
          var marks = slide.querySelectorAll(group.selector);
          var startAt = group.step * timing.revealPause;
          var ordered = shuffle(marks);
          var step = timing.popPhase / ordered.length;

          ordered.forEach(function (mark, index) {
            mark.classList.add('is-revealed');
            mark.style.animationDelay = (startAt + index * step) + 'ms';
          });
        });
      }

      function play() {
        resetPopIcons();
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');
        popIcons();

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }

      Presentation.register({ play: play, audio: audio });
    })();
  </script>
