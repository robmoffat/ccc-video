<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>13. Four: Gemara</title>
  <link rel="stylesheet" href="../styles/presentation-brand.css">
  <link rel="stylesheet" href="../styles/slides.css">
</head>
<body class="theme-brand">
  <div class="slide">
    <article class="card slide-layout slide-layout--center slide-layout--step-reveal bg-black">
      <p class="slide-step-label">4</p>
      <p class="slide-title">Use Gemara</p>
      <audio class="step-reveal__audio" src="10.2.mp3" preload="auto"></audio>
    </article>
  </div>
  <script>
    (function () {
      var slide = document.querySelector('.slide-layout--step-reveal');
      if (!slide) return;

      var audio = slide.querySelector('.step-reveal__audio');

      function play() {
        slide.classList.remove('is-playing');
        void slide.offsetWidth;
        slide.classList.add('is-playing');

        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }
      }

      if (new URLSearchParams(window.location.search).has('autoplay')) {
        play();
      }

      window.addEventListener('click', play);
      window.addEventListener('keydown', function (event) {
        if (event.repeat) return;
        play();
      });
    })();
  </script>
</body>
</html>
